name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (default features)
        run: cargo test --workspace --all-targets
      - name: cargo test (doctests, default)
        run: cargo test --workspace --doc
      - name: cargo test (core only, no default features)
        run: cargo test --no-default-features --lib
      - name: cargo test (doctests, no default features)
        run: cargo test --no-default-features --doc
      - name: cargo test (explicit derive feature)
        run: cargo test --no-default-features --features derive --lib
      - name: cargo test (parallel feature)
        run: cargo test --features parallel --lib
      - name: JMESPath compliance (tier A + full suite gate)
        run: cargo test --test jmespath_compliance -- --nocapture

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy (default)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy (no default features)
        run: cargo clippy --no-default-features --all-targets -- -D warnings

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --document-private-items
      - name: cargo doc (no default features)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-default-features --no-deps --document-private-items
